<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Уведомления Matchmaking</title>
    <style>
        :root {
            --bg: #0f1117;
            --panel: #181c27;
            --card: #22283a;
            --border: #31384d;
            --text: #e7eaf2;
            --muted: #9aa3b8;
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            --purple: #a78bfa;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            padding: 18px 28px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        h1 { margin: 0; font-size: 22px; }
        .subtitle { color: var(--muted); font-size: 13px; margin-top: 4px; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-size: 14px;
        }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--yellow); }
        .connected .dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .disconnected .dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .reconnecting .dot { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
        main { max-width: 820px; margin: 0 auto; padding: 24px 16px; }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
        }
        .badge {
            background: var(--blue);
            color: white;
            padding: 4px 10px;
            border-radius: 999px;
            font-weight: bold;
        }
        button {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { border-color: var(--blue); }
        .empty {
            color: var(--muted);
            text-align: center;
            padding: 50px 20px;
            border: 1px dashed var(--border);
            border-radius: 14px;
        }
        .list { display: flex; flex-direction: column; gap: 12px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 5px solid var(--blue);
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
            animation: pop .2s ease-out;
        }
        .card.success { border-left-color: var(--green); }
        .card.warning { border-left-color: var(--yellow); }
        .card.error { border-left-color: var(--red); }
        @keyframes pop { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .card-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
        .title { font-weight: bold; font-size: 16px; }
        .time { color: var(--muted); font-size: 12px; white-space: nowrap; }
        .description { color: var(--text); margin-bottom: 10px; }
        .meta { color: var(--muted); font-size: 12px; display: flex; flex-wrap: wrap; gap: 10px; }
        details {
            margin-top: 18px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }
        .log { color: var(--muted); font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
<header>
    <div>
        <h1>Уведомления Matchmaking</h1>
        <div class="subtitle">События RabbitMQ приходят на страницу через WebSocket</div>
    </div>
    <div id="status" class="status reconnecting"><span class="dot"></span><span id="statusText">Подключение...</span></div>
</header>

<main>
    <div class="toolbar">
        <div>Уведомления <span id="count" class="badge">0</span></div>
        <div>
            <button onclick="sendPing()">Пинг</button>
            <button onclick="clearNotifications()">Очистить</button>
        </div>
    </div>

    <div id="empty" class="empty">Уведомлений пока нет. Создай игроков и запусти матч через Swagger.</div>
    <div id="list" class="list"></div>

    <details>
        <summary>Журнал подключения</summary>
        <div id="connectionLog" class="log"></div>
    </details>
</main>

<script>
    const WS_URL = `ws://${window.location.host}/ws/notifications`;
    const STORAGE_KEY = 'matchmaking.notifications';
    const MAX_STORED_NOTIFICATIONS = 50;

    let ws = null;
    let reconnectAttempt = 0;
    let notifications = loadStoredNotifications();

    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    const count = document.getElementById('count');
    const connectionLog = document.getElementById('connectionLog');

    function loadStoredNotifications() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
            return [];
        }

        try {
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
            localStorage.removeItem(STORAGE_KEY);
            return [];
        }
    }

    function saveStoredNotifications(items) {
        localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify(items.slice(0, MAX_STORED_NOTIFICATIONS))
        );
    }

    function updateCounter() {
        count.textContent = String(notifications.length);
        empty.style.display = notifications.length === 0 ? 'block' : 'none';
    }

    function renderStoredNotifications() {
        list.innerHTML = '';
        notifications.forEach((item) => renderNotification(item, false));
        updateCounter();
    }

    function logLine(text) {
        const time = new Date().toLocaleTimeString();
        connectionLog.textContent = `[${time}] ${text}\n` + connectionLog.textContent;
    }

    function setStatus(mode, text) {
        status.className = `status ${mode}`;
        statusText.textContent = text;
    }

    function connect() {
        logLine(`Подключение к ${WS_URL}`);
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            reconnectAttempt = 0;
            setStatus('connected', 'Подключено');
            logLine('WebSocket подключен');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'CONNECTED') {
                logLine(`Сервер: ${data.message}`);
                return;
            }
            if (data.type === 'PONG') {
                logLine('Сервер: PONG');
                return;
            }
            addNotification(data);
        };

        ws.onclose = () => {
            setStatus('disconnected', 'Отключено');
            logLine('WebSocket отключен');
            scheduleReconnect();
        };

        ws.onerror = () => {
            logLine('Ошибка WebSocket');
        };
    }

    function scheduleReconnect() {
        const delay = Math.min(1000 * Math.pow(2, reconnectAttempt), 30000);
        reconnectAttempt++;
        setStatus('reconnecting', `Повтор через ${Math.round(delay / 1000)} с`);
        setTimeout(connect, delay);
    }

    function addNotification(data) {
        notifications = [data, ...notifications].slice(0, MAX_STORED_NOTIFICATIONS);
        saveStoredNotifications(notifications);
        renderStoredNotifications();
    }

    function renderNotification(data, prepend) {
        const card = document.createElement('div');
        card.className = `card ${data.level || 'info'}`;
        card.innerHTML = `
            <div class="card-head">
                <div class="title">${escapeHtml(data.title || data.eventType)}</div>
                <div class="time">${new Date(data.receivedAt).toLocaleTimeString()}</div>
            </div>
            <div class="description">${escapeHtml(data.description || '')}</div>
            <div class="meta">
                <span>event: ${escapeHtml(data.eventType || '')}</span>
                <span>source: ${escapeHtml(data.source || '')}</span>
                <span>id: ${escapeHtml(data.eventId || '')}</span>
            </div>
        `;

        if (prepend) {
            list.prepend(card);
        } else {
            list.append(card);
        }
    }

    function clearNotifications() {
        notifications = [];
        localStorage.removeItem(STORAGE_KEY);
        list.innerHTML = '';
        updateCounter();
    }

    function sendPing() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send('ping');
            logLine('Клиент: ping');
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    renderStoredNotifications();
    connect();
</script>
</body>
</html>
